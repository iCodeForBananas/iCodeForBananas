<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background: warm yellow rounded square -->
  <rect width="512" height="512" rx="90" fill="#facc15"/>

  <!-- Banana body path: bottom-left tip → upper-left arc → upper-right tip -->
  <!-- Dark brown outline (slightly wider) -->
  <path d="M 150 432 Q 128 278 212 168 Q 322 50 452 166"
    fill="none" stroke="#78350f" stroke-width="106" stroke-linecap="round"/>

  <!-- Banana fill (warm cream-yellow) -->
  <path d="M 150 432 Q 128 278 212 168 Q 322 50 452 166"
    fill="none" stroke="#fef08a" stroke-width="90" stroke-linecap="round"/>

  <!-- Highlight streak (soft white, offset slightly toward the outer curve edge) -->
  <path d="M 164 408 Q 144 262 224 164 Q 328 56 446 162"
    fill="none" stroke="#fffde7" stroke-width="24" stroke-linecap="round" opacity="0.55"/>

  <!-- Brown nub tips -->
  <circle cx="150" cy="432" r="20" fill="#7c2d12"/>
  <circle cx="452" cy="166" r="20" fill="#7c2d12"/>

  <!-- ── Cute face ── -->
  <!-- Eyes -->
  <circle cx="180" cy="280" r="15" fill="#7c2d12"/>
  <circle cx="195" cy="254" r="15" fill="#7c2d12"/>
  <!-- Eye shines -->
  <circle cx="185" cy="275" r="5" fill="white"/>
  <circle cx="200" cy="249" r="5" fill="white"/>

  <!-- Smile -->
  <path d="M 172 310 Q 194 330 216 317"
    fill="none" stroke="#7c2d12" stroke-width="10" stroke-linecap="round"/>

  <!-- Rosy cheeks -->
  <ellipse cx="157" cy="302" rx="21" ry="14" fill="#fb7185" opacity="0.38"/>
  <ellipse cx="222" cy="288" rx="21" ry="14" fill="#fb7185" opacity="0.38"/>
</svg>

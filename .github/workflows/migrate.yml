# Required GitHub Actions secrets (Settings → Secrets → Actions):
#   SUPABASE_ACCESS_TOKEN — personal access token from supabase.com/dashboard/account/tokens
#   SUPABASE_DB_PASSWORD  — database password for the project (Supabase project settings → Database)
#   SUPABASE_PROJECT_ID   — project reference ID (Supabase project settings → General)

name: Apply Supabase Migrations

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}

      - name: Apply pending migrations
        run: supabase db push
